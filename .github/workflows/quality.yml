name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: study
          POSTGRES_PASSWORD: study
          POSTGRES_DB: study_project
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U study -d study_project"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://study:study@localhost:5432/study_project?schema=public
      JWT_SECRET: dev_secret_32_characters_minimum_123
      JWT_EXPIRES_IN: 7d
      APP_URL: http://127.0.0.1:3100
      E2E_BASE_URL: http://127.0.0.1:3100
      APP_DATA_ROOT: .tmp/test-data
      APP_BACKUP_ROOT: .tmp/test-backups
      SEED_GUARDIAN_EMAIL: guardian@example.com
      SEED_GUARDIAN_PASSWORD: Guardian123!
      UPLOAD_MAX_BYTES: "5242880"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/web prisma:generate

      - name: Install Playwright browser
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Run PR verification gate
        run: pnpm verify:pr
